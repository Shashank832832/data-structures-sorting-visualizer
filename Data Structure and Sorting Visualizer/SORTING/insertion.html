<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insertion Sort Visualizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-image:url(https://wallpaperaccess.com/full/2270782.png);
      background-size: cover;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #inputSection {
      margin-bottom: 20px;
    }

    #arrayInput {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }

    #barContainer {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 400px;
      margin-top: 30px;
    }

    .bar {
      margin: 0 2px;
      background-color: steelblue;
      width: 30px;
      text-align: center;
      color: white;
      transition: all 0.3s ease;
    }

    .bar.highlight {
      background-color: orange;
    }

    .bar.move {
      background-color: purple;
    }

    .bar.inserted {
      background-color: green;
    }
  </style>
</head>
<body>
  <h1 style="color: white;">Insertion Sort Visualizer</h1>
  <div id="inputSection">
    <input type="text" id="arrayInput" placeholder="Enter numbers separated by commas" />
    <button onclick="startSort()">Visualize Sort</button>
  </div>
  <div id="barContainer"></div>

  <script>
    function createBars(array) {
      const container = document.getElementById('barContainer');
      container.innerHTML = '';

      array.forEach((value, index) => {
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.height = `${value * 5}px`;
        bar.textContent = value;
        bar.dataset.index = index;
        container.appendChild(bar);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function insertionSort(array) {
      const bars = document.getElementsByClassName('bar');

      for (let i = 1; i < array.length; i++) {
        let key = array[i];
        let j = i - 1;

        bars[i].classList.add('highlight');
        await sleep(500);

        while (j >= 0 && array[j] > key) {
          bars[j].classList.add('move');
          array[j + 1] = array[j];
          bars[j + 1].style.height = `${array[j] * 5}px`;
          bars[j + 1].textContent = array[j];

          await sleep(500);
          bars[j].classList.remove('move');

          j--;
        }

        array[j + 1] = key;
        bars[j + 1].style.height = `${key * 5}px`;
        bars[j + 1].textContent = key;
        bars[j + 1].classList.add('inserted');

        await sleep(500);
        bars[i].classList.remove('highlight');
        bars[j + 1].classList.remove('inserted');
      }
    }

    function startSort() {
      const input = document.getElementById('arrayInput').value;
      const array = input.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));

      if (array.length === 0) {
        alert('Please enter a valid list of numbers.');
        return;
      }

      createBars(array);
      insertionSort(array);
    }
  </script>
</body>
</html>
